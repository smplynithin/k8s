apiVersion: v1
kind: Service
metadata:
  name: devshelf-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: devshelf
    tier: backend
spec:
  selector:
    app: devshelf
    tier: backend
  ports:
    - name: http
      protocol: TCP 
      port: 80
      targetPort: 8000
  type: ClusterIP