apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devshelf-backend-policy
  namespace: devshelf-prod
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: frontend
      ports:
        - protocol: TCP
          port: 8000