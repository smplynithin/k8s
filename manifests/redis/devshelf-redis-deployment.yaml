apiVersion: apps/v1
kind: Deployment
metadata:
  name: devshelf-redis
  namespace: devshelf-prod
  labels:
    app: devshelf
    tier: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devshelf
      tier: redis
  template:
    metadata:
      labels:
        app: devshelf
        tier: redis
    spec:
      tolerations:
        - key: "app"
          operator: "Equal"
          value: "devshelf"
          effect: "NoSchedule"
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379