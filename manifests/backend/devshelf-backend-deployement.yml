apiVersion: apps/v1
kind: Deployment
metadata:
  name: devshelf-backend
  labels:
    app: devshelf
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devshelf
      tier: backend
  template:
    metadata:
      labels:
        app: devshelf
        tier: backend
    spec:
      containers:
        - name: backend
          image: smplynithin/devshelf-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: devshelf-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: devshelf-secrets
                  key: redis-url
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3