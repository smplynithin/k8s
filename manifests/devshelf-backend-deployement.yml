# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.35.1/deployment.json
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: devshelf-backend
  labels:
    app: devshelf
    tier: backend
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: devshelf
      tier: backend
  template:
    metadata:
      labels: 
        app: devshelf
        tier: backend
    spec:
      containers:
        - name: backend
          image: smplynithin/devshelf-backend:latest
          ports: 
            - containerPort: 8000   