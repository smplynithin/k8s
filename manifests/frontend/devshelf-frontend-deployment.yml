apiVersion: apps/v1
kind: Deployment
metadata:
  name: devshelf-frontend
  labels:
    app: devshelf
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devshelf
      tier: frontend
  template:
    metadata:
      labels:
        app: devshelf
        tier: frontend
    spec:
      tolerations:
        - key: "app"
          operator: "Equal"
          value: "devshelf"
          effect: "NoSchedule"
      containers:
        - name: frontend
          image: smplynithin/devshelf-frontend:latest
          ports:
            - containerPort: 80