apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: devshelf-ingress
  namespace: {{ .Values.namespace }}

spec:
  ingressClassName: nginx

  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devshelf-backend
                port:
                  number: 80

          - path: /
            pathType: Prefix
            backend:
              service:
                name: devshelf-frontend
                port:
                  number: 80